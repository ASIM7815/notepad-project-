<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad - Simple Text Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Notepad</h1>
            <div class="toolbar">
                
                <button id="saveBtn" class="btn" title="Save to File (Ctrl+S)">
                    <span>💾</span> Save
                </button>
                
                <button id="clearBtn" class="btn btn-danger" title="Clear All">
                    <span>🗑️</span> Clear
                </button>
                <button id="copyBtn" class="btn" title="Copy to Clipboard">
                    <span>📋</span> Copy
                </button>
            </div>
        </header>
        
        
            
           <textarea id="notepad" placeholder="Start typing your notes here..."></textarea>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".txt" style="display: none;">
    
    <script src="script.js"></script>
</body>
</html>
