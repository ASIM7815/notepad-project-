<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad - Simple Text Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Notepad</h1>
            <div class="toolbar">
                <button id="newBtn" class="btn" title="New Document (Ctrl+N)">
                    <span>📄</span> New
                </button>
                <button id="saveBtn" class="btn" title="Save to File (Ctrl+S)">
                    <span>💾</span> Save
                </button>
                <button id="loadBtn" class="btn" title="Load from File (Ctrl+O)">
                    <span>📁</span> Load
                </button>
                <button id="clearBtn" class="btn btn-danger" title="Clear All">
                    <span>🗑️</span> Clear
                </button>
                <button id="copyBtn" class="btn" title="Copy to Clipboard">
                    <span>📋</span> Copy
                </button>
            </div>
        </header>
        
        <div class="editor-container">
            <div class="info-bar">
                <span id="charCount">Characters: 0</span>
                <span id="wordCount">Words: 0</span>
                <span id="lineCount">Lines: 1</span>
                <span id="saveStatus">Auto-saved</span>
            </div>
            
            <textarea id="notepad" placeholder="Start typing your notes here..."></textarea>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".txt" style="display: none;">
    
    <script src="script.js"></script>
</body>
</html>
